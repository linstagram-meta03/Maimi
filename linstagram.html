<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        
        .instagram-logo {
            width: 180px;
            height: 60px;
            background: linear-gradient(135deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D, #F56040, #F77737, #FCAF45);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -4px;
            text-align: center;
            line-height: 55px;
            margin: 20px auto;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            font-size: 16px;
            background-color: #fafafa;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #a8a8a8;
            background-color: #ffffff;
        }
        
        .login-btn {
            background: #0095f6;
            color: white;
            font-weight: 600;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .login-btn:hover {
            background: #0077c5;
        }
        
        .meta-logo {
            width: 60px;
            height: 20px;
        }
    </style>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-[350px] mx-auto p-4">
        <!-- Language Selector -->
        <div class="flex justify-center mb-6">
            <div class="flex items-center gap-1 text-sm text-gray-600 cursor-pointer hover:text-black">
                English (US)
                <span class="text-xs">▼</span>
            </div>
        </div>

        <!-- Instagram Logo -->
        <div class="instagram-logo">Instagram</div>

        <!-- Login Form -->
        <form class="space-y-3">
            <!-- Username -->
            <div>
                <input 
                    type="text" 
                    class="input-field" 
                    placeholder="Username, email or mobile number"
                    required>
            </div>
            
            <!-- Password -->
            <div>
                <input 
                    type="password" 
                    class="input-field" 
                    placeholder="Password"
                    required>
            </div>
            
            <!-- Log In Button -->
            <button 
                type="submit"
                class="login-btn w-full py-3 text-white font-medium">
                Log in
            </button>
        </form>

        <!-- Forgot Password -->
        <div class="text-center my-5">
            <a href="#" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
        </div>

        <!-- Divider -->
        <div class="relative flex items-center py-2">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="flex-shrink mx-4 text-xs text-gray-500 font-medium">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <!-- Create New Account -->
        <button 
            onclick="alert('Create new account clicked!')"
            class="w-full border border-gray-300 text-blue-600 font-medium py-3 rounded-lg hover:bg-gray-50 transition">
            Create new account
        </button>

        <!-- Meta -->
        <div class="flex justify-center mt-8">
            <div class="flex items-center gap-1 text-gray-500">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/>
                </svg>
                <span class="text-sm font-medium">Meta</span>
            </div>
        </div>
    </div>
</body>
</html>
